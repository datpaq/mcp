openapi: 3.0.3
info:
  title: Datpaq ProAPI
  description: >
    Comprehensive multi-service API platform providing aviation, geolocation, financial, utilities, image processing,
    and data enrichment capabilities. All endpoints require authentication via API key passed as an x-api-key header or
    api_key query parameter.
  version: 1.0.0
  contact:
    name: Datpaq Support
    url: https://datpaq.com
  license:
    name: Proprietary
servers:
  - url: https://datpaq.com/api/v1
    description: Production
  - url: https://staging.datpaq.com/api/v1
    description: Staging
security:
  - ApiKeyHeader: []
  - ApiKeyQuery: []
tags:
  - name: Aircraft
    description: FAA aircraft registry lookups by tail number, ICAO hex, or type code
  - name: Company Enrichment
    description: Company data enrichment by name or domain
  - name: Convert Time
    description: Timezone-aware datetime conversion
  - name: Country Codes
    description: ISO country code lookup and metadata
  - name: Current Time
    description: Current time by IANA timezone identifier
  - name: Dictionary
    description: Word definitions and linguistic data
  - name: DNS Lookup
    description: DNS record resolution (A, MX, CNAME, TXT, NS, ALL)
  - name: Domain Lookup
    description: Domain availability and registration information
  - name: Email Validation
    description: Email address format and deliverability validation
  - name: EV Charger
    description: Electric vehicle charging station discovery and status
  - name: Exchange Rates
    description: Currency exchange rates and conversion
  - name: Helicopter
    description: Helicopter registry lookups by registration, ICAO, or serial number
  - name: Image Processing
    description: Image resize, compress, convert, crop, and pipeline operations
  - name: IP Geolocation
    description: Geographic location data for IPv4 and IPv6 addresses
  - name: IP Intelligence
    description: Threat intelligence and risk scoring for IP addresses
  - name: MAC Address
    description: MAC address vendor and manufacturer resolution
  - name: MX Lookup
    description: Mail exchange record lookup with optional SMTP and SPF validation
  - name: Precious Metals
    description: Precious metal and cryptocurrency pricing data
  - name: Profanity
    description: Content moderation and profanity detection
  - name: Public Holidays
    description: Global public holiday data by country and year
  - name: Sample Data
    description: Mock data generation for testing and development (Faker.js)
  - name: Secure Relay
    description: Secure HMAC-verified HTTP request forwarding
  - name: Spell Check
    description: Multi-language spell checking with correction suggestions
  - name: States
    description: U.S. state metadata by abbreviation or FIPS code
  - name: Text Language
    description: Text language detection supporting 176+ languages
  - name: Thesaurus
    description: Synonyms, antonyms, and related word lookup
  - name: Unit Conversion
    description: Unit conversion across 100+ measurement types
  - name: User Avatar
    description: Dynamic user avatar generation in PNG, WebP, or SVG
  - name: Validate IP
    description: IP address validation and classification (IPv4, IPv6, CIDR)
  - name: VIN Lookup
    description: Vehicle identification number decoding via NHTSA
  - name: Web Screenshot
    description: Web page screenshot capture via headless browser
  - name: WHOIS
    description: Domain WHOIS registration data lookup
  - name: Working Days
    description: Business day calculations with regional holiday support
paths:
  /aircraft/lookup:
    get:
      tags:
        - Aircraft
      operationId: aircraftLookupByTail
      summary: Look up aircraft by tail number
      description: >
        Returns aircraft ownership, manufacturer, model, type, and year from the FAA registry using an N-number (tail
        number).
      parameters:
        - name: tail
          in: query
          required: true
          description: FAA tail/N-number (e.g. N12345)
          schema:
            type: string
            example: N12345
      responses:
        "200":
          description: Aircraft record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AircraftRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /aircraft/icao/{hex}:
    get:
      tags:
        - Aircraft
      operationId: aircraftLookupByIcao
      summary: Look up aircraft by ICAO hex code
      parameters:
        - name: hex
          in: path
          required: true
          description: 6-character ICAO hexadecimal transponder code
          schema:
            type: string
            pattern: ^[0-9A-Fa-f]{6}$
            example: A1B2C3
      responses:
        "200":
          description: Aircraft record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AircraftRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /aircraft/type/{code}:
    get:
      tags:
        - Aircraft
      operationId: aircraftLookupByType
      summary: Look up aircraft type specifications
      parameters:
        - name: code
          in: path
          required: true
          description: Aircraft type designator code (ICAO, e.g. B737, C172)
          schema:
            type: string
            example: B737
      responses:
        "200":
          description: Aircraft type specifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /aircraft/batch:
    post:
      tags:
        - Aircraft
      operationId: aircraftBatchLookup
      summary: Batch aircraft lookups by tail number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tails
              properties:
                tails:
                  type: array
                  items:
                    type: string
                  maxItems: 100
                  example:
                    - N12345
                    - N67890
      responses:
        "200":
          description: Array of aircraft records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /company-enrichment/enrich:
    post:
      tags:
        - Company Enrichment
      operationId: companyEnrich
      summary: Enrich company data by name or domain
      description: >
        Returns structured company data including industry, size, social profiles, and contact information. Provide
        company_name, domain, or both.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_name:
                  type: string
                  example: OpenAI
                domain:
                  type: string
                  example: openai.com
      responses:
        "200":
          description: Enriched company data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /convert-time:
    get:
      tags:
        - Convert Time
      operationId: convertTime
      summary: Convert a datetime between timezones
      description: >
        Converts a datetime value from a source timezone to a target timezone. Accepts ISO 8601 strings, Unix epoch
        timestamps, or omit sourceTime to convert the current time.
      parameters:
        - name: sourceTime
          in: query
          required: false
          description: Time to convert (ISO 8601 or Unix ms). Defaults to current time.
          schema:
            type: string
            example: "2025-12-31T12:00:00Z"
        - name: sourceZone
          in: query
          required: true
          description: Source IANA timezone identifier
          schema:
            type: string
            example: America/New_York
        - name: targetZone
          in: query
          required: true
          description: Target IANA timezone identifier
          schema:
            type: string
            example: Europe/London
      responses:
        "200":
          description: Converted datetime with timezone metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /country-codes/countries:
    get:
      tags:
        - Country Codes
      operationId: countryList
      summary: List all countries with ISO codes and metadata
      responses:
        "200":
          description: Array of country objects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /country-codes/countries/{iso}:
    get:
      tags:
        - Country Codes
      operationId: countryByIso
      summary: Get a country by ISO 2 or ISO 3 code
      parameters:
        - name: iso
          in: path
          required: true
          description: ISO 3166-1 alpha-2 or alpha-3 code
          schema:
            type: string
            minLength: 2
            maxLength: 3
            example: US
      responses:
        "200":
          description: Country object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /country-codes/countries/search:
    get:
      tags:
        - Country Codes
      operationId: countrySearch
      summary: Search countries by full or partial name
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            example: United States
      responses:
        "200":
          description: Matching countries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /country-codes/export:
    get:
      tags:
        - Country Codes
      operationId: countryExport
      summary: Export country data in bulk
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum:
              - json
              - csv
            default: json
      responses:
        "200":
          description: Exported country data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /current-time:
    get:
      tags:
        - Current Time
      operationId: currentTime
      summary: Get current time for an IANA timezone
      description: Returns the current date/time with UTC offset and DST status for a given timezone.
      parameters:
        - name: target
          in: query
          required: true
          description: IANA timezone identifier (e.g. America/New_York, UTC, Asia/Tokyo)
          schema:
            type: string
            example: America/New_York
      responses:
        "200":
          description: Current time data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /define:
    post:
      tags:
        - Dictionary
      operationId: dictionaryDefine
      summary: Look up word definition
      description: Returns definitions, part of speech, pronunciation, and etymology for the given word.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - word
              properties:
                word:
                  type: string
                  example: serendipity
                include_pronunciation:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Word definition(s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /dns:
    get:
      tags:
        - DNS Lookup
      operationId: dnsLookup
      summary: Resolve DNS records for a domain
      description: Supports record types A, AAAA, MX, CNAME, TXT, NS, SOA, and ALL.
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
            example: example.com
        - name: type
          in: query
          required: false
          description: DNS record type. Defaults to A.
          schema:
            type: string
            enum:
              - A
              - AAAA
              - MX
              - CNAME
              - TXT
              - NS
              - SOA
              - ALL
            default: A
      responses:
        "200":
          description: DNS record(s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /domain-lookup:
    get:
      tags:
        - Domain Lookup
      operationId: domainLookupGet
      summary: Check domain availability and registration info
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
            example: example.com
        - name: include_registration
          in: query
          required: false
          schema:
            type: boolean
        - name: include_expiry
          in: query
          required: false
          schema:
            type: boolean
        - name: tlds
          in: query
          required: false
          description: Comma-separated TLDs to check (e.g. com,net,org)
          schema:
            type: string
            example: com,net,org
      responses:
        "200":
          description: Domain availability and registration data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /domain-lookup/lookup:
    post:
      tags:
        - Domain Lookup
      operationId: domainLookupPost
      summary: Check domain availability (POST)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - domain
              properties:
                domain:
                  type: string
                  example: example.com
                tlds:
                  type: array
                  items:
                    type: string
                  example:
                    - com
                    - net
                    - org
      responses:
        "200":
          description: Domain availability data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /email-validation/validate:
    post:
      tags:
        - Email Validation
      operationId: emailValidateSingle
      summary: Validate a single email address
      description: >
        Checks email format, domain MX records, and optional deliverability. Detects disposable/temporary address
        providers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                include_details:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /email-validation/validate-batch:
    post:
      tags:
        - Email Validation
      operationId: emailValidateBatch
      summary: Validate multiple email addresses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emails
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    format: email
                  maxItems: 1000
                  example:
                    - alice@example.com
                    - bob@test.org
      responses:
        "200":
          description: Batch validation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /ev-charger/stations:
    get:
      tags:
        - EV Charger
      operationId: evStationsByCoords
      summary: Find EV charging stations near coordinates
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitude (-90 to 90)
          schema:
            type: number
            example: 37.7749
        - name: lon
          in: query
          required: true
          description: Longitude (-180 to 180)
          schema:
            type: number
            example: -122.4194
        - name: radius
          in: query
          required: false
          description: Search radius in miles (max 100, default 5)
          schema:
            type: number
            default: 5
      responses:
        "200":
          description: List of nearby charging stations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /ev-charger/stations/search:
    get:
      tags:
        - EV Charger
      operationId: evStationsByAddress
      summary: Search EV charging stations by address
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
            example: San Francisco, CA
      responses:
        "200":
          description: Matching charging stations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /ev-charger/stations/{id}:
    get:
      tags:
        - EV Charger
      operationId: evStationById
      summary: Get specific charging station by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "12345"
      responses:
        "200":
          description: Station details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /ev-charger/networks:
    get:
      tags:
        - EV Charger
      operationId: evNetworks
      summary: List all supported charging networks
      responses:
        "200":
          description: Network list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /ev-charger/status/{id}:
    get:
      tags:
        - EV Charger
      operationId: evStationStatus
      summary: Get real-time station status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "12345"
      responses:
        "200":
          description: Station availability status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /exchange-rates-and-currency/api/exchange:
    get:
      tags:
        - Exchange Rates
      operationId: exchangeRateGet
      summary: Get exchange rate or convert currency
      description: >
        Returns the current exchange rate between two currencies. Provide an amount to perform conversion. Supports fiat
        (ISO 4217) and crypto (BTC, ETH).
      parameters:
        - name: from
          in: query
          required: true
          description: Source currency code (e.g. USD) or crypto symbol (e.g. BTC)
          schema:
            type: string
            example: USD
        - name: to
          in: query
          required: true
          description: Target currency code
          schema:
            type: string
            example: EUR
        - name: amount
          in: query
          required: false
          description: Amount to convert. Omit to retrieve rate only.
          schema:
            type: number
            minimum: 0
            example: 100
      responses:
        "200":
          description: Exchange rate or converted amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /exchange-rates-and-currency/api/bulk-exchange:
    post:
      tags:
        - Exchange Rates
      operationId: exchangeRateBulk
      summary: Batch currency conversions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - conversions
              properties:
                conversions:
                  type: array
                  items:
                    type: object
                    required:
                      - from
                      - to
                    properties:
                      from:
                        type: string
                        example: USD
                      to:
                        type: string
                        example: EUR
                      amount:
                        type: number
                        example: 100
      responses:
        "200":
          description: Batch conversion results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/ServiceUnavailable"
  /helicopter/lookup:
    get:
      tags:
        - Helicopter
      operationId: helicopterLookupByRegistration
      summary: Look up helicopter by registration number
      parameters:
        - name: registration
          in: query
          required: true
          schema:
            type: string
            example: N123H
      responses:
        "200":
          description: Helicopter registry record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
